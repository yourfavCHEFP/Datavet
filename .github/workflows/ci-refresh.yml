name: CI and Scheduled Refresh

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static compile checks
        run: |
          python -m py_compile streamlit_app.py
          python -m py_compile scripts/run_refresh_jobs.py

      - name: Connector smoke diagnostics
        continue-on-error: true
        run: |
          python scripts/connector_smoke_test.py

  scheduled-refresh:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh jobs
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          DATAVET_GEMINI_PROXY: ${{ secrets.DATAVET_GEMINI_PROXY }}
          DATAVET_KIMI_PROXY: ${{ secrets.DATAVET_KIMI_PROXY }}
          DATAVET_DATABASE_URL: ${{ secrets.DATAVET_DATABASE_URL }}
          DATAVET_S3_BUCKET: ${{ secrets.DATAVET_S3_BUCKET }}
          DATAVET_S3_PREFIX: ${{ secrets.DATAVET_S3_PREFIX }}
        run: |
          python scripts/run_refresh_jobs.py

      - name: Commit refresh snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .datavet || true
          git diff --staged --quiet || git commit -m "chore: scheduled dataset refresh snapshots"
          git push
